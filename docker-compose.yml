version: '3.8'

services:
  # =====================================================================
  # 1. LOCAL DATABASE COMPONENT (Used ONLY on your laptop)
  # =====================================================================
  mysqldb:
    image: mysql:8.0
    container_name: api-portal-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: api_portal_db
      MYSQL_USER: api_user
      MYSQL_PASSWORD: api_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      start_period: 15s

  # =====================================================================
  # 2. LOCAL APPLICATION COMPONENT (Used ONLY on your laptop)
  # =====================================================================
  api-gateway-app:
    build: .
    container_name: api-portal-app
    restart: always
    ports:
      - "8081:8000"
    environment:
      # Local development fallback parameters (Overridden dynamically in Vercel dashboard)
      SPRING_DATASOURCE_URL: jdbc:mysql://mysqldb:3306/api_portal_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: api_user
      SPRING_DATASOURCE_PASSWORD: api_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      JWT_SECRET_KEY: 3d9f7b16c8a4e2d5f0b3c6e9a8f5d2c1b4a7e0f3d6c9b2a5e8f1d4c7b0a3e6f9
    depends_on:
      mysqldb:
        condition: service_healthy

# =====================================================================
# DATA VOLUMES
# =====================================================================
volumes:
  mysql_data:
