# =====================================================================
# SERVER CONFIGURATION
# =====================================================================
server.port=${PORT:8000}

# =====================================================================
# DATASOURCE & DATABASE ENGINE CONFIGURATION
# =====================================================================
# Uses environment variables if present (Docker/Production), otherwise falls back to local machine parameters
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/api_portal_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:your_local_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================================
# ORM / HIBERNATE CONFIGURATION
# =====================================================================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =====================================================================
# SECURITY & APPLICATION PROPERTIES
# =====================================================================
# The application reads this 256-bit hexadecimal string to verify JWT signature layers
application.security.jwt.secret-key=${JWT_SECRET_KEY:TGzOMc4oDiZVutd0b9d3yjofhUb2gxlJcbhzH32dsxDRZbYHF5AqIjdgIiDSNhdSnCAQwVba9HBBYfggHHaRy2}

# Expiration lifespan window configurations (e.g., Access Token: 15 mins, Refresh Token: 7 days)
application.security.jwt.expiration=900000
application.security.jwt.refresh-token.expiration=604800000

# Enable openapi endpoints and lazy-load the assets on demand
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.api-docs.auto-tag-classes=false

# Force Swagger to use HTTPS for all generated try-it-out requests
springdoc.swagger-ui.server-url=https://api-portal-production-123.up.railway.app

# Force Spring Boot to recognize HTTPS headers sent by Railway's proxy
server.forward-headers-strategy=framework

springdoc.security[0].BearerAuth=
